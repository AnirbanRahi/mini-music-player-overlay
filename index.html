<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="container">
        <div class="playing">
            <img src="resources/playing.png" class="playing-image" alt="">
            <P class="artist-name">Artist Name</P>
            <p class="song-name">Song Name</p>
            <audio id="audio"></audio>
        </div>

        <div class="progress-container">
            <p class="progress-time">00:00</p>
            <input type="range" id="progress" value="0" min="0" max="100" class="progress-bar">
            <p class="progress-time">03:45</p>

        </div>

        <div class="controls">
            <!--skib-back-->
            <svg xmlns="http://www.w3.org/2000/svg" id="skip-back" width="32" height="32" fill="#ffffff"
                viewBox="0 0 256 256">
                <path
                    d="M208,47.88V208.12a16,16,0,0,1-24.43,13.43L64,146.77V216a8,8,0,0,1-16,0V40a8,8,0,0,1,16,0v69.23L183.57,34.45A15.95,15.95,0,0,1,208,47.88Z">
                </path>
            </svg>
            <!--play-->
            <svg xmlns="http://www.w3.org/2000/svg" id="play" width="32" height="32" fill="#ffffff"
                viewBox="0 0 256 256">
                <path id="play-svg"
                    d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm40.55,110.58-52,36A8,8,0,0,1,104,164V92a8,8,0,0,1,12.55-6.58l52,36a8,8,0,0,1,0,13.16Z">
                </path>
                <path id="pause-svg" style="display: none;"
                    d="M216,48V208a16,16,0,0,1-16,16H160a16,16,0,0,1-16-16V48a16,16,0,0,1,16-16h40A16,16,0,0,1,216,48ZM96,32H56A16,16,0,0,0,40,48V208a16,16,0,0,0,16,16H96a16,16,0,0,0,16-16V48A16,16,0,0,0,96,32Z">
                </path>
            </svg>
            <!--skib-forward-->
            <svg xmlns="http://www.w3.org/2000/svg" id="skip-forward" width="32" height="32" fill="#ffffff"
                viewBox="0 0 256 256">
                <path
                    d="M208,40V216a8,8,0,0,1-16,0V146.77L72.43,221.55A15.95,15.95,0,0,1,48,208.12V47.88A15.95,15.95,0,0,1,72.43,34.45L192,109.23V40a8,8,0,0,1,16,0Z">
                </path>
            </svg>
        </div>
        <div class="volume">
            <svg xmlns="http://www.w3.org/2000/svg" id="volume" width="32" height="32" fill="#ffffff"
                viewBox="0 0 256 256">
                <path
                    d="M168,32V224a8,8,0,0,1-12.91,6.31L85.25,176H40a16,16,0,0,1-16-16V96A16,16,0,0,1,40,80H85.25l69.84-54.31A8,8,0,0,1,168,32Zm32,64a8,8,0,0,0-8,8v48a8,8,0,0,0,16,0V104A8,8,0,0,0,200,96Z">
                </path>
            </svg>
            <input type="range" id="volume" value="0" min="0" max="100" step="1" class="progress-bar">
        </div>
        <br>
        <div class="search">
            <p>Library</p>
            <div class="search-box">
                <input type="text" placeholder="Search">
                <svg xmlns="http://www.w3.org/2000/svg" id="search" width="28" height="28" fill="#ffffff"
                    viewBox="0 0 256 256">
                    <path
                        d="M168,112a56,56,0,1,1-56-56A56,56,0,0,1,168,112Zm61.66,117.66a8,8,0,0,1-11.32,0l-50.06-50.07a88,88,0,1,1,11.32-11.31l50.06,50.06A8,8,0,0,1,229.66,229.66ZM112,184a72,72,0,1,0-72-72A72.08,72.08,0,0,0,112,184Z">
                    </path>
                </svg>
            </div>
        </div>
        <div class="library" id="library">
        </div>
    </div>
</body>

</html>
