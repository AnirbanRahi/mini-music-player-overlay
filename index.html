<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
    <script src="cardrenderer.js" defer></script>
    <script src="script.js" defer></script>
    <script src="settings.js" defer></script>
</head>

<body>
    <div class="titlebar">
        <span class="title">Musiclay</span>
    </div>
    <div class="container">
        <div class="playing">
            <img src="./music-logo.png" class="playing-image" alt="">
            <P class="artist-name">Artist Name</P>
            <p class="song-name">Song Name</p>

            <audio id="audio"></audio>
        </div>

        <div class="progress-container">
            <p class="progress-time">00:00</p>
            <input type="range" id="progress" value="0" class="progress-bar">
            <p class="progress-time-ending">00:00</p>

        </div>

        <div class="controls">
            <!--skib-back-->
            <svg xmlns="http://www.w3.org/2000/svg" id="skip-back" width="32" height="32" fill="#ffffff"
                viewBox="0 0 256 256">
                <path
                    d="M208,47.88V208.12a16,16,0,0,1-24.43,13.43L64,146.77V216a8,8,0,0,1-16,0V40a8,8,0,0,1,16,0v69.23L183.57,34.45A15.95,15.95,0,0,1,208,47.88Z">
                </path>
            </svg>
            <!--play-->
            <svg xmlns="http://www.w3.org/2000/svg" id="play" width="64" height="64" fill="#ffffff"
                viewBox="0 0 256 256">
                <path id="play-svg"
                    d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm40.55,110.58-52,36A8,8,0,0,1,104,164V92a8,8,0,0,1,12.55-6.58l52,36a8,8,0,0,1,0,13.16Z">
                </path>
                <path id="pause-svg" style="display: none;"
                    d="M216,48V208a16,16,0,0,1-16,16H160a16,16,0,0,1-16-16V48a16,16,0,0,1,16-16h40A16,16,0,0,1,216,48ZM96,32H56A16,16,0,0,0,40,48V208a16,16,0,0,0,16,16H96a16,16,0,0,0,16-16V48A16,16,0,0,0,96,32Z">
                </path>
            </svg>
            <!--skib-forward-->
            <svg xmlns="http://www.w3.org/2000/svg" id="skip-forward" width="32" height="32" fill="#ffffff"
                viewBox="0 0 256 256">
                <path
                    d="M208,40V216a8,8,0,0,1-16,0V146.77L72.43,221.55A15.95,15.95,0,0,1,48,208.12V47.88A15.95,15.95,0,0,1,72.43,34.45L192,109.23V40a8,8,0,0,1,16,0Z">
                </path>
            </svg>
        </div>
        <div class="settings">
            <div class="hotkey-container">
                <!-- <span class="hotkey-label">Hotkey:</span> -->
                <input type="text" id="hotkey-display" value="" readonly />
                <button id="hotkey-button">Edit</button>
            </div>
            <div id="sources">
                <svg xmlns="http://www.w3.org/2000/svg" id="add-sources-svg" width="25" height="25" fill="#ffffff"
                    viewBox="0 0 256 256">
                    <path
                        d="M224,68H153.33l-28.8-21.6a12.05,12.05,0,0,0-7.2-2.4H72A12,12,0,0,0,60,56V76H40A12,12,0,0,0,28,88V200a12,12,0,0,0,12,12H192.89A11.12,11.12,0,0,0,204,200.89V180h20.89A11.12,11.12,0,0,0,236,168.89V80A12,12,0,0,0,224,68ZM196,200.89a3.12,3.12,0,0,1-3.11,3.11H40a4,4,0,0,1-4-4V88a4,4,0,0,1,4-4H85.33a4,4,0,0,1,2.4.8l29.87,22.4a4,4,0,0,0,2.4.8h72a4,4,0,0,1,4,4Zm32-32a3.12,3.12,0,0,1-3.11,3.11H204V112a12,12,0,0,0-12-12H121.33L92.53,78.4a12.05,12.05,0,0,0-7.2-2.4H68V56a4,4,0,0,1,4-4h45.33a4,4,0,0,1,2.4.8L149.6,75.2a4,4,0,0,0,2.4.8h72a4,4,0,0,1,4,4Z">
                    </path>
                </svg>
            </div>
            <div id="refresh">
                <svg xmlns="http://www.w3.org/2000/svg" id="refresh-svg" width="24" height="24" fill="#ffffff"
                    viewBox="0 0 256 256">
                    <path
                        d="M220,128a92,92,0,0,1-90.77,92H128a91.47,91.47,0,0,1-63.13-25.1,4,4,0,1,1,5.5-5.82A84,84,0,1,0,68.6,68.57l-.13.12L34.3,100H72a4,4,0,0,1,0,8H24a4,4,0,0,1-4-4V56a4,4,0,0,1,8,0V94.89l35-32A92,92,0,0,1,220,128Z">
                    </path>
                </svg>
            </div>
            <div class="volume">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="#ffffff" viewBox="0 0 256 256">
                    <path
                        d="M161.76,28.41a4,4,0,0,0-4.22.43L86.63,84H40A12,12,0,0,0,28,96v64a12,12,0,0,0,12,12H86.63l70.91,55.16A4.07,4.07,0,0,0,160,228a3.92,3.92,0,0,0,1.76-.41A4,4,0,0,0,164,224V32A4,4,0,0,0,161.76,28.41ZM156,215.82l-65.54-51A4.06,4.06,0,0,0,88,164H40a4,4,0,0,1-4-4V96a4,4,0,0,1,4-4H88a4.06,4.06,0,0,0,2.46-.84l65.54-51ZM204,104v48a4,4,0,0,1-8,0V104a4,4,0,0,1,8,0Z">
                    </path>
                </svg>
                <input type="range" id="volume-level" value="1.0" min="0.0" max="1.0" step="0.01" class="progress-bar">
            </div>
        </div>

        <div class="search">
            <p class="library-text">Library</p>
            <div class="search-box">
                <input type="text" placeholder="Search" id="search-input">
                <svg xmlns="http://www.w3.org/2000/svg" id="search-svg" width="28" height="28" fill="#ffffff"
                    viewBox="0 0 256 256">
                    <path
                        d="M226.83,221.17l-52.7-52.7a84.1,84.1,0,1,0-5.66,5.66l52.7,52.7a4,4,0,0,0,5.66-5.66ZM36,112a76,76,0,1,1,76,76A76.08,76.08,0,0,1,36,112Z">
                    </path>
                </svg>
            </div>
        </div>
        <div class="library" id="library">
        </div>
    </div>
</body>

</html>
