<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="playing">
            <img src="resources/playing.png" class="playing-image" alt="">
            <P class="artist-name">Artist Name</P>
            <p class="song-name">Song Name</p>
            <audio src="resources/All The Stars.mp3"></audio>
        </div>

        <div class="progress-container">

            <p class="progress-time">00:00</p>
            <input type="range" id="progress" value="0" min="0" max="100" class="progress-bar">

                        d="M168,112a56,56,0,1,1-56-56A56,56,0,0,1,168,112Zm61.66,117.66a8,8,0,0,1-11.32,0l-50.06-50.07a88,88,0,1,1,11.32-11.31l50.06,50.06A8,8,0,0,1,229.66,229.66ZM112,184a72,72,0,1,0-72-72A72.08,72.08,0,0,0,112,184Z">

    </div>
</body>

</html>
